<!doctype html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>C?</title>

  <!-- Tailwind  -->
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

  <!-- CSS -->
  <link rel="stylesheet" href="style.css" />
</head>

<body class="bg-zinc-950 text-zinc-400">
  <main class="w-scree h-screen px-8 text-center flex justify-center items-center">
    <audio id="audio" src="./audio.mp3"></audio>
    <button id="player"
      class="text-2xl w-full md:w-auto md:px-8 py-2 rounded-full cursor-pointer border-zinc-700 shadow-lg transition ease-in-out duration-300 hover:border-zinc-800 hover:text-zinc-600">
      Toque na tela
    </button>
  </main>
</body>

<script>
  const button = document.getElementById("player");
  const audio = document.getElementById("audio");

  let isPlay = false;

  button.addEventListener("click", () => {
    if (!isPlay) {
      audio.play();
      isPlay = true;
      button.innerText = "..."
    }
  });

  audio.addEventListener("ended", () => {
    window.close();
  });
</script>

</html>
